<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reversi</title>
  <style>
    :root {
      --player-info-shadow-color: rgba(128, 128, 128, 0.464)
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
    }

    .player-info {
      width: 100vw;
      height: 7rem;
      box-shadow: 
        0px 5px 10px 0px var(--player-info-shadow-color),
        0px -5px 10px 0px var(--player-info-shadow-color);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .turn-display {
      color: white;
      background-color: orange;
      border-radius: 3rem;
      padding: 10px;
      visibility: hidden;
    }

    .stone {
      display: inline-block;
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
      border: 1px solid black;
    }

    .black {
      background-color: black;
    }

    .white {
      background-color: white;
    }

    .pass-display {
      color: white;
      background-color: orange;
      border-radius: 3rem;
      margin-left: 1rem;
      padding: 5px;
      display: none;
    }

    .win-or-lose-display {
      color: white;
      border-radius: 3rem;
      margin-right: 1rem;
      padding: 5px;
      display: none;
    }

    .win {
      background-color: red;
    }

    .lose {
      background-color: blue;
    }

    .draw {
      background-color: green;
    }
  </style>
</head>

<body>
  <div class="player-info">
    <h3>
      <span id="black-win" class="win-or-lose-display win">WIN</span>
      <span id="black-lose" class="win-or-lose-display lose">LOSE</span>
      <span id="black-draw" class="win-or-lose-display draw">DRAW</span>
      <span class="stone black"></span>
      <span id="black-stone-count">2</span>
      <span id="black-pass" class="pass-display">PASS</span>
    </h3>
    <div class="turn-display" id="black-turn-notification">黒のターンです</div>
  </div>

  <canvas id="canvas"></canvas>

  <div class="player-info">
    <h3>
      <span id="white-win" class="win-or-lose-display win">WIN</span>
      <span id="white-lose" class="win-or-lose-display lose">LOSE</span>
      <span id="white-draw" class="win-or-lose-display draw">DRAW</span>
      <span class="stone white"></span>
      <span id="white-stone-count">2</span>
      <span id="white-pass" class="pass-display">PASS</span>
    </h3>
    <div class="turn-display" id="white-turn-notification">白のターンです</div>
  </div>

  <script type="module" src="./scripts/main.js"></script>
</body>

</html>
